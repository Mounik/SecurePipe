# GitLab CI — SAST Only
# Use when you only want static analysis

stages:
  - sast

variables:
  SECUREPIPE_OUTPUT: "securepipe-reports"

semgrep:
  stage: sast
  image:
    name: returntocorp/semgrep:1.64
    entrypoint: [""]
  script:
    - mkdir -p ${SECUREPIPE_OUTPUT}
    - semgrep --config ${SEMGREP_CONFIG:-auto} --json --output ${SECUREPIPE_OUTPUT}/sast-results.json .
    - |
      COUNT=$(jq '.results | length' ${SECUREPIPE_OUTPUT}/sast-results.json 2>/dev/null || echo "0")
      echo "Semgrep found ${COUNT} findings"
  artifacts:
    paths:
      - ${SECUREPIPE_OUTPUT}/
    expire_in: 30 days
  cache:
    paths:
      - .semgrep-cache/