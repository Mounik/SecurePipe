# ─── SecurePipe — Full GitLab CI Pipeline ─────────────────────────────────
# Drop this into your .gitlab-ci.yml or include it remotely:
#   include:
#     - remote: 'https://raw.githubusercontent.com/Mounik/SecurePipe/main/templates/gitlab/full-pipeline.yml'
#
# Variables (set in CI/CD Settings or .securepipe.yml):
#   SECUREPIPE_FAIL_ON_CRITICAL: "true"
#   SECUREPIPE_FAIL_ON_HIGH: "true"
#   SECUREPIPE_REPORT_FORMAT: "html"
#   SECUREPIPE_CONTAINER_IMAGE: ""  (set for container scanning)

stages:
  - secrets
  - sast
  - dependencies
  - container
  - dast
  - signing
  - sbom
  - report

variables:
  SECUREPIPE_OUTPUT: "securepipe-reports"
  TRIVY_NO_PROGRESS: "true"
  TRIVY_CACHE_DIR: ".trivy-cache"

cache:
  paths:
    - .trivy-cache/
    - .semgrep-cache/

# ─── SECRETS DETECTION ────────────────────────────────────────────────────
gitleaks:
  stage: secrets
  image:
    name: zricethezav/gitleaks:8.18
    entrypoint: [""]
  script:
    - mkdir -p ${SECUREPIPE_OUTPUT}
    - gitleaks detect --source . --report-format json --report-path ${SECUREPIPE_OUTPUT}/secrets-results.json || true
    - |
      FINDINGS=$(jq 'length' ${SECUREPIPE_OUTPUT}/secrets-results.json 2>/dev/null || echo "0")
      echo "Gitleaks found ${FINDINGS} secrets"
      if [ "$FINDINGS" -gt 0 ]; then
        echo "Secrets detected! Review ${SECUREPIPE_OUTPUT}/secrets-results.json"
        if [ "${SECUREPIPE_FAIL_ON_CRITICAL}" = "true" ]; then exit 1; fi
      fi
  artifacts:
    paths:
      - ${SECUREPIPE_OUTPUT}/secrets-results.json
    expire_in: 30 days
  rules:
    - if: $SECUREPIPE_SKIP_SECRETS != "true"

# ─── SAST ─────────────────────────────────────────────────────────────────
semgrep:
  stage: sast
  image:
    name: returntocorp/semgrep:1.64
    entrypoint: [""]
  script:
    - mkdir -p ${SECUREPIPE_OUTPUT}
    - semgrep --config ${SEMGREP_CONFIG:-auto} --json --output ${SECUREPIPE_OUTPUT}/sast-results.json .
    - |
      COUNT=$(jq '.results | length' ${SECUREPIPE_OUTPUT}/sast-results.json 2>/dev/null || echo "0")
      echo "Semgrep found ${COUNT} findings"
      CRITICAL=$(jq '[.results[] | select(.extra.severity == "ERROR")] | length' ${SECUREPIPE_OUTPUT}/sast-results.json 2>/dev/null || echo "0")
      HIGH=$(jq '[.results[] | select(.extra.severity == "WARNING")] | length' ${SECUREPIPE_OUTPUT}/sast-results.json 2>/dev/null || echo "0")
      if [ "${SECUREPIPE_FAIL_ON_CRITICAL}" = "true" ] && [ "$CRITICAL" -gt 0 ]; then echo "${CRITICAL} critical findings"; exit 1; fi
      if [ "${SECUREPIPE_FAIL_ON_HIGH}" = "true" ] && [ "$HIGH" -gt 0 ]; then echo "${HIGH} high findings"; exit 1; fi
  artifacts:
    paths:
      - ${SECUREPIPE_OUTPUT}/sast-results.json
    expire_in: 30 days
  rules:
    - if: $SECUREPIPE_SKIP_SAST != "true"

# ─── DEPENDENCY SCANNING ─────────────────────────────────────────────────
trivy-dependencies:
  stage: dependencies
  image:
    name: aquasec/trivy:0.51
    entrypoint: [""]
  script:
    - mkdir -p ${SECUREPIPE_OUTPUT}
    - trivy fs --format json --output ${SECUREPIPE_OUTPUT}/dependency-results.json .
    - |
      COUNT=$(jq '[.Results[]?.Vulnerabilities // [] | length] | add // 0' ${SECUREPIPE_OUTPUT}/dependency-results.json 2>/dev/null || echo "0")
      echo "Trivy found ${COUNT} dependency vulnerabilities"
      CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL")] | length' ${SECUREPIPE_OUTPUT}/dependency-results.json 2>/dev/null || echo "0")
      HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "HIGH")] | length' ${SECUREPIPE_OUTPUT}/dependency-results.json 2>/dev/null || echo "0")
      if [ "${SECUREPIPE_FAIL_ON_CRITICAL}" = "true" ] && [ "$CRITICAL" -gt 0 ]; then echo "${CRITICAL} CRITICAL vulnerabilities found"; exit 1; fi
      if [ "${SECUREPIPE_FAIL_ON_HIGH}" = "true" ] && [ "$HIGH" -gt 0 ]; then echo "${HIGH} HIGH vulnerabilities found"; exit 1; fi
  artifacts:
    paths:
      - ${SECUREPIPE_OUTPUT}/dependency-results.json
    expire_in: 30 days
  rules:
    - if: $SECUREPIPE_SKIP_DEPS != "true"

# ─── CONTAINER SCANNING ──────────────────────────────────────────────────
trivy-container:
  stage: container
  image:
    name: aquasec/trivy:0.51
    entrypoint: [""]
  script:
    - mkdir -p ${SECUREPIPE_OUTPUT}
    - |
      if [ -z "${SECUREPIPE_CONTAINER_IMAGE}" ]; then
        echo "SECUREPIPE_CONTAINER_IMAGE not set, skipping container scan"
        exit 0
      fi
    - trivy image --format json --output ${SECUREPIPE_OUTPUT}/container-results.json ${SECUREPIPE_CONTAINER_IMAGE}
    - |
      COUNT=$(jq '[.Results[]?.Vulnerabilities // [] | length] | add // 0' ${SECUREPIPE_OUTPUT}/container-results.json 2>/dev/null || echo "0")
      echo "Container scan complete for ${SECUREPIPE_CONTAINER_IMAGE} — ${COUNT} vulnerabilities"
  artifacts:
    paths:
      - ${SECUREPIPE_OUTPUT}/container-results.json
    expire_in: 30 days
  rules:
    - if: $SECUREPIPE_SKIP_CONTAINER != "true"

hadolint:
  stage: container
  image:
    name: hadolint/hadolint:2.12-alpine
    entrypoint: [""]
  script:
    - hadolint Dockerfile || echo "No Dockerfile found, skipping Hadolint"
  rules:
    - exists:
        - Dockerfile
      if: $SECUREPIPE_SKIP_CONTAINER != "true"

# ─── DAST ─────────────────────────────────────────────────────────────────
zap-baseline:
  stage: dast
  image:
    name: owasp/zap2docker-stable:2.15
    entrypoint: [""]
  script:
    - mkdir -p ${SECUREPIPE_OUTPUT}
    - |
      if [ -z "${SECUREPIPE_DAST_URL}" ]; then
        echo "SECUREPIPE_DAST_URL not set, skipping DAST"
        exit 0
      fi
    - zap-baseline.py -t ${SECUREPIPE_DAST_URL} -J dast-results.json -r ${SECUREPIPE_OUTPUT}/dast-results.html || true
    - cp /zap/json-report/dast-results.json ${SECUREPIPE_OUTPUT}/dast-results.json 2>/dev/null || true
  artifacts:
    paths:
      - ${SECUREPIPE_OUTPUT}/dast-results.json
      - ${SECUREPIPE_OUTPUT}/dast-results.html
    expire_in: 30 days
  rules:
    - if: $SECUREPIPE_SKIP_DAST != "true"

# ─── SIGNING ──────────────────────────────────────────────────────────────
cosign-sign:
  stage: signing
  image:
    name: bitnami/cosign:2.4
    entrypoint: [""]
  script:
    - |
      if [ -z "${SECUREPIPE_CONTAINER_IMAGE}" ]; then
        echo "No container image to sign"
        exit 0
      fi
      if [ -z "${COSIGN_KEY}" ]; then
        echo "COSIGN_KEY not set, skipping signing"
        exit 0
      fi
    - cosign sign --key env://COSIGN_KEY ${SECUREPIPE_CONTAINER_IMAGE} || echo "Signing failed"
  rules:
    - if: $SECUREPIPE_SKIP_SIGNING != "true"

# ─── SBOM ─────────────────────────────────────────────────────────────────
syft-sbom:
  stage: sbom
  image:
    name: anchore/syft:1.11
    entrypoint: [""]
  script:
    - mkdir -p ${SECUREPIPE_OUTPUT}
    - syft dir:./ -o cyclonedx-json > ${SECUREPIPE_OUTPUT}/sbom-cyclonedx.json
    - echo "SBOM generated"
  artifacts:
    paths:
      - ${SECUREPIPE_OUTPUT}/sbom-cyclonedx.json
    expire_in: 30 days
  rules:
    - if: $SECUREPIPE_SKIP_SBOM != "true"

# ─── REPORT AGGREGATION ───────────────────────────────────────────────────
securepipe-report:
  stage: report
  image: python:3.12-slim
  script:
    - pip install pyyaml --quiet
    - python3 scripts/report-generator.py ${SECUREPIPE_OUTPUT} ${SECUREPIPE_OUTPUT}/securepipe-report.html
    - echo "Report generated: ${SECUREPIPE_OUTPUT}/securepipe-report.html"
  artifacts:
    paths:
      - ${SECUREPIPE_OUTPUT}/
    expire_in: 90 days
  when: always
  dependencies:
    - gitleaks
    - semgrep
    - trivy-dependencies
    - trivy-container
    - zap-baseline
    - syft-sbom